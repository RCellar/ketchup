<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cc2200"/>
      <stop offset="100%" stop-color="#881100"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(200,30,30,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" rx="8" fill="#0d1117"/>
  <rect width="800" height="220" rx="8" fill="url(#grid)"/>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="799" height="219" rx="8" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- Left accent line -->
  <rect x="0" y="0" width="4" height="220" fill="url(#accent)" rx="0"/>
  <!-- Fix top-left corner overlap -->
  <rect x="0" y="0" width="8" height="8" fill="#0d1117"/>
  <rect x="0" y="0" width="4" height="220" fill="url(#accent)"/>

  <!-- Meta line: install command -->
  <text x="50" y="62" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="11" font-weight="300" fill="#484f58" letter-spacing="1">
    <tspan fill="#cc2200">$</tspan> claude install-skill github:RCellar/ketchup
  </text>

  <!-- Title -->
  <text x="50" y="120" font-family="'Instrument Serif', 'Georgia', 'Times New Roman', serif" font-size="58" font-weight="400" fill="#e6edf3" letter-spacing="-0.5">
    <tspan font-style="italic" fill="#cc3322">ketchup</tspan>
  </text>

  <!-- Description -->
  <text x="50" y="148" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="13" font-weight="300" fill="#7d8590">
    Perspective-shaped technical research.
  </text>
  <text x="50" y="168" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="13" font-weight="300" fill="#7d8590">
    Ketchup on anything, like it should be.
  </text>

  <!-- Right column stats -->
  <text x="760" y="62" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="10" fill="#484f58" text-anchor="end">
    <tspan font-weight="500" fill="#7d8590">5</tspan> perspective lenses
  </text>
  <text x="760" y="82" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="10" fill="#484f58" text-anchor="end">
    <tspan font-weight="500" fill="#7d8590">MCP</tspan> plugin prefetch
  </text>
  <text x="760" y="102" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="10" fill="#484f58" text-anchor="end">
    <tspan font-weight="500" fill="#7d8590">Obsidian</tspan> output
  </text>
  <text x="760" y="122" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="10" fill="#484f58" text-anchor="end">
    <tspan font-weight="500" fill="#7d8590">Parallel</tspan> research agents
  </text>

  <!-- Version badge -->
  <rect x="710" y="142" width="56" height="22" rx="4" fill="none" stroke="#cc220040" stroke-width="1"/>
  <text x="738" y="157" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="11" fill="#cc2200" text-anchor="middle">v1.0.0</text>
</svg>
